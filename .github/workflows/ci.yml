name: CI

on:
  push:
    branches: [main, develop, "v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ["18", "20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      # WER gate: only run on Node 20 to avoid redundancy
      - name: Corpus eval — practical/phonetic (Aksharantar WER gate)
        if: matrix.node == '20'
        run: |
          if [ -f "test/corpus/aksharantar_eval.ts" ]; then
            npx tsx test/corpus/aksharantar_eval.ts
          else
            echo "aksharantar_eval.ts not yet present — skipping WER gate"
          fi
