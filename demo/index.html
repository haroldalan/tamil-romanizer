<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamil Romanizer v2 — Live Demo</title>
  <meta name="description" content="Context-aware Tamil-to-English romanization. Try all schemes: Practical, ISO 15919, ALA-LC, ITRANS." />
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>Tamil Romanizer <span class="version-badge">v2.0.0</span></h1>
      <p class="subtitle">A context-aware, rule-based Tamil transliteration engine with prefix-forward exception trie.</p>
    </header>

    <main>
      <div class="controls">
        <div class="control-group">
          <label for="scheme-select">Scheme:</label>
          <select id="scheme-select">
            <option value="practical">Practical / Standard (Tanglish)</option>
            <option value="practical/phonetic">Practical / Phonetic (NLP-optimized)</option>
            <option value="iso15919">ISO 15919 (Scholarly)</option>
            <option value="alalc">ALA-LC (Library of Congress)</option>
            <option value="itrans">ITRANS (South Indian)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="capitalize-select">Capitalization:</label>
          <select id="capitalize-select">
            <option value="none">None (strict lowercase)</option>
            <option value="sentence">Sentence case</option>
            <option value="words">Title case (per word)</option>
          </select>
        </div>

        <div class="control-checkbox">
          <input type="checkbox" id="exceptions-check" checked />
          <label for="exceptions-check">Use Exception / Proper-noun Dictionary</label>
        </div>

        <div class="control-checkbox">
          <input type="checkbox" id="debug-check" />
          <label for="debug-check">Show debug pipeline</label>
        </div>
      </div>

      <div class="io-panels">
        <div class="panel">
          <label for="input-text">Tamil Input</label>
          <textarea id="input-text" placeholder="தமிழ் உரை இங்கே தட்டச்சு செய்யவும்...

Example:
சென்னையில் ஒரு கம்ப்யூட்டர் கம்பெனி உள்ளது.
இந்தியா ஒரு அழகான நாடு.
பக்ஷி என்பது ஒரு பறவை."></textarea>
        </div>

        <div class="panel">
          <label for="output-text">Romanized Output</label>
          <textarea id="output-text" readonly placeholder="Output will appear here..."></textarea>
        </div>
      </div>

      <div id="debug-panel" class="debug-panel" style="display:none;">
        <div class="debug-panel-header">
          <h3>Pipeline Debug View</h3>
          <span class="debug-word-hint">Showing first word: <strong id="debug-word-label">—</strong></span>
        </div>
        <div id="debug-content" class="debug-content"></div>
      </div>
    </main>

    <footer>
      <p>Built using the <a href="https://www.npmjs.com/package/tamil-romanizer" target="_blank"><code>tamil-romanizer</code></a> npm package &mdash; <a href="https://github.com/haroldalan/tamil-romanizer" target="_blank">GitHub</a></p>
    </footer>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
